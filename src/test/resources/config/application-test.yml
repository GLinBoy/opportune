server:
  port: 8080

spring:
  ai:
    openai:
      api-key: test-key-not-real
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
  datasource:
    url: jdbc:h2:mem:opportune;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: opportune
    password:
  jpa:
    defer-datasource-initialization: false
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/h2
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    validate-on-migrate: true
    clean-disabled: false
  mail:
    host: localhost
    port: 25
    username: test
    password: test

application:
  security:
    authentication:
      jwt:
        base64-secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHktbXVzdC1iZS1hdC1sZWFzdC01MTItYml0cy1sb25n
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  geoip:
    enabled: false

logging:
  level:
    ROOT: ERROR

