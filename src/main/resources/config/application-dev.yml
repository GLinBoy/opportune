server:
  port: 8080
  forward-headers-strategy: native
  include-stacktrace: always

spring:
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: true
  ai:
    openai:
      base-url: https://integrate.api.nvidia.com/v1
      api-key: \${OPPORTUNE_OPENAI_API_KEY}
      chat:
        completions-path: /chat/completions
        options:
          model: mistralai/mistral-nemotron
          temperature: 0.3
          max-tokens: 24000
#  ai:
#    openai:
#      base-url: https://generativelanguage.googleapis.com/v1beta/openai
#      api-key: \${OPPORTUNE_GOOGLE_API_KEY}
#      chat:
#        completions-path: /chat/completions
#        options:
#          model: gemini-2.5-flash
#          temperature: 0.3
#          max-tokens: 24000
  jackson:
    serialization:
      indent-output: true
  datasource:
    url: jdbc:h2:file:./build/h2db/db/opportune;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: opportune
    password:
  jpa:
    defer-datasource-initialization: false
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/h2
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    validate-on-migrate: true
    clean-disabled: false
  h2:
    console:
      enabled: true
  thymeleaf:
    cache: false
  mail:
    host: \${OPPORTUNE_MAIL_HOST}
    port: \${OPPORTUNE_MAIL_PORT}
    username: \${OPPORTUNE_MAIL_USERNAME}
    password: \${OPPORTUNE_MAIL_PASSWORD}
    protocol: smtp
    tls: true
    properties.mail.smtp:
      auth: false
      starttls.enable: false
      ssl.trust: \${OPPORTUNE_MAIL_HOST}

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    ROOT: ERROR
    org.hibernate.SQL: ERROR
    com.glinboy.opportune: DEBUG

application:
  files:
    base-path: ./build/uploads/
