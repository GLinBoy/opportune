server:
  port: 8080
  forward-headers-strategy: native

spring:
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: true
  jackson:
    serialization:
      indent-output: true
  datasource:
    url: jdbc:h2:file:./target/h2db/db/opportune;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: opportune
    password:
  jpa:
    defer-datasource-initialization: false
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: validate
    sql:
      init:
        platform: h2
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    validate-on-migrate: true
  h2:
    console:
      enabled: true
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    ROOT: ERROR
    org.hibernate.SQL: ERROR
    com.glinboy.opportune: DEBUG
