<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="en">
<head>
  <title>Opportune activation</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" th:href="@{|${baseUrl}/favicon.ico|}" />
</head>
<body>
<p th:text="|Hi, ${profile.forename} ${profile.surname}|">Dear</p>
<p>
  For your Opportune account a password reset was requested, please click on the URL below to reset it:
</p>
<p>
  <a th:href="@{|${baseUrl}/password-reset?code=${code}|}">Password reset link</a>
</p>
<p>
  <span>Regards, </span>
  <br />
  <em>Opportune team.</em>
</p>
</body>
</html>
